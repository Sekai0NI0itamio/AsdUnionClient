    "${userHome}/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-stdlib-jdk7/${kotlinCompilerVersion}/222b2be42672d47c002c1b22ac9f030d781fc5db/kotlin-stdlib-jdk7-${kotlinCompilerVersion}.jar",
    "${userHome}/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-stdlib-jdk8/${kotlinCompilerVersion}/72f75cc23f0756dec50b2dcbeb72561501fb8af9/kotlin-stdlib-jdk8-${kotlinCompilerVersion}.jar",
    "${userHome}/.gradle/caches/modules-2/files-2.1/org.jetbrains/annotations/13.0/919f0dfe192fb4e063e7dacadee7f8bb9a2672a9/annotations-13.0.jar"
)

def kotlinPatchSourceDir = file('src/main/kotlin')
def defaultKotlinPatchFiles = files(
    fileTree(dir: kotlinPatchSourceDir, include: '**/*.kt'),
    file('FDPClient-b12-modified-main/src/main/java/net/asd/union/features/module/modules/player/scaffolds/Scaffold.kt'),
    file('FDPClient-b12-modified-main/src/main/java/net/asd/union/features/module/modules/player/scaffolds/Tower.kt'),
    file('FDPClient-b12-modified-main/src/main/java/net/asd/union/features/module/modules/movement/Sprint.kt')
)
def selectedKotlinPatchFiles = project.hasProperty('kotlinPatchPaths') ?
    project.property('kotlinPatchPaths').split(',').collect { file(it.trim()) } :
    defaultKotlinPatchFiles.files
def kotlinPatchFiles = files(selectedKotlinPatchFiles)

task compilePatchedKotlin(type: JavaExec) {
    inputs.files kotlinPatchFiles
    outputs.dir sourceSets.main.output.classesDir

    onlyIf {
        !kotlinPatchFiles.filter { it.exists() }.isEmpty()
    }

    classpath = kotlinCompilerClasspath
    main = 'org.jetbrains.kotlin.cli.jvm.K2JVMCompiler'

    doFirst {
        sourceSets.main.output.classesDir.mkdirs()

        args = [
            '-no-stdlib',
            '-no-reflect',
            '-jvm-target', '1.8',
            '-classpath', sourceSets.main.compileClasspath.asPath,
            '-d', sourceSets.main.output.classesDir.absolutePath
        ] + kotlinPatchFiles.files.findAll { it.exists() }.collect { it.absolutePath }
    }
}

compileJava.dependsOn compilePatchedKotlin

def coreModManifest = [
    'FMLCorePlugin': 'net.asd.union.injection.forge.MixinLoader',
    'FMLCorePluginContainsFMLMod': 'true',
    'ForceLoadAsMod': 'true',
    'ModSide': 'CLIENT',
    'TweakClass': 'org.spongepowered.asm.launch.MixinTweaker',
    'TweakOrder': '0',
    'MixinConfigs': 'fdpclient.forge.mixins.json',
    'FMLAT': 'fdpclient_at.cfg'
]

jar {
    classifier = 'patches'
    manifest {
        attributes(coreModManifest)
    }
}

mixin {
    disableRefMapWarning = true
    defaultObfuscationEnv searge
    add sourceSets.main, 'fdpclient.mixins.refmap.json'
}

reobf {
    jar {}
}

def rebuildDir = file("$buildDir/rebuild/unpacked")

task cleanRebuildDir(type: Delete) {
    delete rebuildDir
}

task unpackOriginalJar(type: Copy, dependsOn: [cleanRebuildDir, reobfJar]) {
    from zipTree(file('AsdUnion-b12.jar'))
    into rebuildDir
}

task overlayPatchedJar(type: Copy, dependsOn: unpackOriginalJar) {
    from zipTree(jar.archivePath)
    into rebuildDir
}

task rebuildJar(type: Jar, dependsOn: overlayPatchedJar) {
    archiveName = 'AsdUnion-b12-rebuilt.jar'
    destinationDir = file("$buildDir/libs")

    from(rebuildDir) {
        exclude 'META-INF/MANIFEST.MF'
        exclude 'META-INF/*.SF'
        exclude 'META-INF/*.RSA'
        exclude 'META-INF/*.DSA'
    }

    manifest {
        attributes(coreModManifest)
    }
}

build.dependsOn rebuildJar
