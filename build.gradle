apply plugin: 'java'
apply plugin: 'net.minecraftforge.gradle.forge'
apply plugin: 'org.spongepowered.mixin'

group = 'net.asd.union'
version = project.mod_version
archivesBaseName = project.mod_name

sourceCompatibility = targetCompatibility = '1.8'

compileJava {
    sourceCompatibility = targetCompatibility = '1.8'
    options.encoding = 'UTF-8'
}

minecraft {
    version = "${project.minecraft_version}-${project.forge_version}-${project.minecraft_version}"
    mappings = project.mappings_version
    runDir = 'run'
    makeObfSourceJar = false
}

runClient {
    jvmArgs '-Dfml.coreMods.load=net.asd.union.injection.forge.MixinLoader'
    jvmArgs '-Dmixin.hotSwap=true'
    jvmArgs '-Dmixin.checks.interfaces=true'
}

repositories {
    maven { url uri("${rootDir}/local-maven") }
}

dependencies {
    compile files('AsdUnion-b12.jar')
}

def kotlinCompilerVersion = '2.0.21'
def userHome = System.properties['user.home']
def kotlinCompilerClasspath = files(
    "${userHome}/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-compiler-embeddable/${kotlinCompilerVersion}/79346ed53db48b18312a472602eb5c057070c54d/kotlin-compiler-embeddable-${kotlinCompilerVersion}.jar",
